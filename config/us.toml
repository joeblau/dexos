# US region validator (three-region demo). Distinct ports so multi-node
# demos on one host do not collide (see eu.toml / tokyo.toml).
[node]
name = "us-1"
region = "us-east"
light = false
roles = ["validator", "sequencer", "witness", "gateway"]

[network]
listen = "0.0.0.0:9000"
bootstrap_peers = ["eu-1.dexos.local:9001", "tokyo-1.dexos.local:9002"]
enable_quic = false
enable_datagrams = false

[consensus]
checkpoint_interval_ms = 100
epoch_length = 100000
validator_set_path = "validators.toml"

[storage]
data_dir = "./data/us-1"
snapshot_interval_sequences = 1000000
segment_size_mb = 1024

[rpc]
listen = "0.0.0.0:8080"
read_only = false

[performance]
pin_threads = false
busy_poll = false
drain_timeout_ms = 30000

[observability]
log_format = "text"
metrics_listen = "127.0.0.1:9100"
