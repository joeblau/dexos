# Single-node development configuration.
[node]
name = "dev-1"
region = "local"
light = false
roles = ["validator", "sequencer", "witness", "gateway"]

[network]
listen = "0.0.0.0:9000"
bootstrap_peers = []
# QUIC sessions and datagram dissemination are not implemented yet; leaving them
# enabled would fail closed at startup. Set true once the transport lands.
enable_quic = false
enable_datagrams = false

[consensus]
checkpoint_interval_ms = 100
epoch_length = 100000
validator_set_path = "validators.toml"

[storage]
data_dir = "./data/dev-1"
snapshot_interval_sequences = 1000000
segment_size_mb = 1024

[rpc]
listen = "0.0.0.0:8080"
read_only = false

[performance]
# Core pinning and busy-polled ingress are not implemented yet (fail closed).
pin_threads = false
busy_poll = false

[observability]
# Use `json` in production log pipelines; `text` is easier for local dev.
log_format = "text"
# Empty disables the scrape server. Example: "127.0.0.1:9100"
metrics_listen = ""
