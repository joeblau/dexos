# Single-node development configuration.
[node]
name = "dev-1"
region = "local"
light = false
roles = ["validator", "sequencer", "witness", "gateway"]

[network]
listen = "0.0.0.0:9000"
bootstrap_peers = []
# QUIC (independent streams) + native datagrams. Requires a binary built with
# the `quic` feature (default for node/marketd). TCP fallback has reduced HOL guarantees.
enable_quic = false
enable_datagrams = false

[consensus]
checkpoint_interval_ms = 100
delta_ms = 100
epoch_length = 100000
validator_set_path = "validators.toml"

[storage]
data_dir = "./data/dev-1"
snapshot_interval_sequences = 1000000
segment_size_mb = 1024

[rpc]
listen = "0.0.0.0:8080"
read_only = false

[performance]
# Real affinity on Linux (sched_setaffinity) / macOS (thread policy). Fail/warn
# when pin_threads=true cannot be applied.
pin_threads = false
busy_poll = false
drain_timeout_ms = 30000

[observability]
# Use `json` in production log pipelines; `text` is easier for local dev.
log_format = "text"
# Empty disables the scrape server. Example: "127.0.0.1:9100"
metrics_listen = "127.0.0.1:9100"
