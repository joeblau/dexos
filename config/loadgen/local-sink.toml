human = true

[[regions]]
name = "local"
users = 100
source_ips = ["127.0.0.1"]

[[regions.endpoints]]
name = "local-reference-sink"
address = "127.0.0.1:9900"
weight = 1
connections_per_source_ip = 2
target_kind = "ReferenceSink"

