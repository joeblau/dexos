# cargo-deny configuration — advisories, licenses, bans, sources.
# Run in CI via `cargo deny check`. See scripts/check-core-deps.sh for the
# deterministic-core dependency-direction gate that cargo-deny cannot express per-crate.

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
confidence-threshold = 0.9
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Generic-blockchain frameworks are a non-goal; keep them out of the tree entirely.
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
