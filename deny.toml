# cargo-deny configuration — advisories, licenses, bans, sources.
# Run in CI via `cargo deny check`. See scripts/check-core-deps.sh for the
# deterministic-core dependency-direction gate that cargo-deny cannot express per-crate.

[advisories]
version = 2
yanked = "deny"
ignore = [
    # atomic-polyfill (unmaintained). Pulled in transitively only via
    # postcard 1.x -> heapless 0.7, and only for bare-metal targets without
    # native atomics (e.g. thumbv6m). dexos builds only for server targets
    # that use core atomics, so this crate is never compiled. postcard 1.1.3
    # (latest) still pins heapless ^0.7, so there is no upgrade path yet.
    "RUSTSEC-2023-0089",
]

[licenses]
version = 2
confidence-threshold = 0.9
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Internal workspace crates are referenced by path with no version requirement,
# which cargo-deny counts as a wildcard. Exempt path deps; registry wildcards
# are still denied.
allow-wildcard-paths = true
# Generic blockchain frameworks and dynamic TLS implementations are intentionally
# outside the architecture. Adding one requires an explicit, reviewed policy change.
deny = [
    { name = "ethers" },
    { name = "web3" },
    { name = "solana-sdk" },
    { name = "substrate-api-client" },
    { name = "openssl" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
