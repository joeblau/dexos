# cargo-deny configuration — advisories, licenses, bans, sources.
# Run in CI via `cargo deny check`. See scripts/check-core-deps.sh for the
# deterministic-core dependency-direction gate that cargo-deny cannot express per-crate.

[graph]
# The native desktop/mobile frontends (`dexos-desktop`, `dexos-mobile`) pull the
# unavoidable Dioxus GUI stack — GTK3/webkit2gtk/wry on Linux — which brings
# crates that violate the NODE's deliberately strict supply-chain policy:
# unmaintained gtk-rs bindings, an NCSA-licensed crate, and openssl (explicitly
# banned below as a dynamic-TLS implementation the exchange never links). Those
# constraints exist for the production node artifact, not a desktop GUI, so the
# two native app crates are excluded from the audited graph. Everything that
# ships in the node — and the wasm-safe `dexos-web` / `dexos-ui` frontends — stays
# fully audited. Adding a real supply-chain dependency to the node still requires
# an explicit, reviewed policy change here.
exclude = ["dexos-desktop", "dexos-mobile"]

[advisories]
version = 2
yanked = "deny"
ignore = [
    # atomic-polyfill (unmaintained). Pulled in transitively only via
    # postcard 1.x -> heapless 0.7, and only for bare-metal targets without
    # native atomics (e.g. thumbv6m). dexos builds only for server targets
    # that use core atomics, so this crate is never compiled. postcard 1.1.3
    # (latest) still pins heapless ^0.7, so there is no upgrade path yet.
    "RUSTSEC-2023-0089",

    # rustls-pemfile unmaintained; parsing moved to rustls-pki-types 1.9+.

    "RUSTSEC-2025-0134",
]

[licenses]
version = 2
confidence-threshold = 0.9
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Internal workspace crates are referenced by path with no version requirement,
# which cargo-deny counts as a wildcard. Exempt path deps; registry wildcards
# are still denied.
allow-wildcard-paths = true
# Generic blockchain frameworks and dynamic TLS implementations are intentionally
# outside the architecture. Adding one requires an explicit, reviewed policy change.
deny = [
    { name = "ethers" },
    { name = "web3" },
    { name = "solana-sdk" },
    { name = "substrate-api-client" },
    { name = "openssl" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
