name: release-artifacts

# Tag-driven production artifact build for supported Linux architectures.
# Produces binaries, SHA-256 checksums, SBOM, build metadata, rollback notes,
# and Sigstore/cosign keyless signatures (OIDC) for each asset.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # cosign keyless OIDC

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  artifacts:
    name: linux artifacts (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write # upload release assets on tags
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: build artifacts (locked)
        env:
          TARGET: ${{ matrix.target }}
          OUT_DIR: dist-${{ matrix.target }}
        run: ./scripts/build-release-artifacts.sh
      - name: smoke test published layout
        run: |
          BIN=$(ls dist-${{ matrix.target }}/marketd-* | head -1)
          "${BIN}" --help
          (cd dist-${{ matrix.target }} && shasum -a 256 -c SHA256SUMS-${{ matrix.target }})
          test -s dist-${{ matrix.target }}/sbom-${{ matrix.target }}.cdx.json
          test -s dist-${{ matrix.target }}/ROLLBACK-${{ matrix.target }}.md
          test -s dist-${{ matrix.target }}/build-metadata-${{ matrix.target }}.json
          python3 -c "import json; m=json.load(open('dist-${{ matrix.target }}/build-metadata-${{ matrix.target }}.json')); assert m['panic_strategy']=='abort', m"
      - name: install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: sign artifacts (keyless OIDC)
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          DIR="dist-${{ matrix.target }}"
          SUMS="${DIR}/SHA256SUMS-${{ matrix.target }}"
          BIN=$(ls "${DIR}"/marketd-* | head -1)
          # Sign the binary and the per-target checksums file. Keyless uses GitHub OIDC.
          cosign sign-blob --yes \
            --bundle "${BIN}.cosign.bundle" \
            "${BIN}"
          cosign sign-blob --yes \
            --bundle "${SUMS}.cosign.bundle" \
            "${SUMS}"
          # Prove verification works against the public Rekor log.
          cosign verify-blob \
            --bundle "${BIN}.cosign.bundle" \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${BIN}"
          test -s "${BIN}.cosign.bundle"
          test -s "${SUMS}.cosign.bundle"
          ls -la "${DIR}"
      - name: upload workflow artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-${{ matrix.target }}
          path: dist-${{ matrix.target }}/
          if-no-files-found: error
      - name: attach to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          # Every artifact name is target-suffixed, so both matrix legs can
          # attach to the same release without overwriting each other.
          files: dist-${{ matrix.target }}/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-manifest:
    name: multi-arch release manifest
    needs: artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: download x86_64
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-x86_64-unknown-linux-gnu
          path: dist-x86_64
      - name: download aarch64
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-aarch64-unknown-linux-gnu
          path: dist-aarch64
      - name: write multi-arch manifest
        run: |
          python3 - <<'PY'
          import json, pathlib, hashlib, os
          def sha256(p):
              h = hashlib.sha256()
              with open(p, "rb") as f:
                  for chunk in iter(lambda: f.read(1 << 20), b""):
                      h.update(chunk)
              return h.hexdigest()
          manifest = {"version": os.environ.get("GITHUB_REF_NAME", "dev"), "targets": {}}
          for name, d in [("x86_64-unknown-linux-gnu", "dist-x86_64"), ("aarch64-unknown-linux-gnu", "dist-aarch64")]:
              root = pathlib.Path(d)
              bins = [p for p in root.glob("marketd-*") if not p.name.endswith(".cosign.bundle")]
              assert bins, f"missing binary under {d}"
              b = bins[0]
              manifest["targets"][name] = {
                  "binary": b.name,
                  "sha256": sha256(b),
                  "sbom": f"sbom-{name}.cdx.json",
                  "checksums": f"SHA256SUMS-{name}",
                  "signature_bundle": b.name + ".cosign.bundle",
              }
          pathlib.Path("RELEASE_MANIFEST.json").write_text(json.dumps(manifest, indent=2) + "\n")
          print(json.dumps(manifest, indent=2))
          PY
      - name: combine per-target checksums
        # Single writer for the unsuffixed SHA256SUMS: only this job (which runs
        # once, after both matrix legs) writes it, so there is no upload race.
        # Operators can `shasum -a 256 -c SHA256SUMS` against either binary.
        run: |
          set -euo pipefail
          cat dist-x86_64/SHA256SUMS-x86_64-unknown-linux-gnu \
              dist-aarch64/SHA256SUMS-aarch64-unknown-linux-gnu > SHA256SUMS
          cat SHA256SUMS
      - name: install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: sign combined checksums (keyless OIDC)
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          cosign sign-blob --yes \
            --bundle SHA256SUMS.cosign.bundle \
            SHA256SUMS
          cosign verify-blob \
            --bundle SHA256SUMS.cosign.bundle \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            SHA256SUMS
          test -s SHA256SUMS.cosign.bundle
      - name: upload manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-manifest
          path: |
            RELEASE_MANIFEST.json
            SHA256SUMS
            SHA256SUMS.cosign.bundle
          if-no-files-found: error
      - name: attach manifest to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            RELEASE_MANIFEST.json
            SHA256SUMS
            SHA256SUMS.cosign.bundle
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
