name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly portability / cold-cache sanity (Monday 06:00 UTC).
    - cron: "0 6 * * 1"

# Fork pull requests receive a read-only token. Jobs repeat this declaration so
# future edits cannot accidentally inherit broader repository defaults.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        # The Dioxus `ui/*` frontends are gated by the dedicated `apps` job
        # (they need a wasm target / desktop system libraries the engine gates
        # deliberately avoid). Keep them out of every engine `--workspace` gate.
        run: >-
          cargo clippy --workspace --all-targets --locked
          --exclude dexos-ui --exclude dexos-web
          --exclude dexos-desktop --exclude dexos-mobile
          -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: test
        # ui/* frontends are gated by the `apps` job (see the clippy step).
        run: >-
          cargo test --workspace --locked
          --exclude dexos-ui --exclude dexos-web
          --exclude dexos-desktop --exclude dexos-mobile

  docs:
    name: cargo doc
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: docs (fail on warnings)
        env:
          RUSTDOCFLAGS: "-D warnings"
        # ui/* frontends are gated by the `apps` job (see the clippy step).
        run: >-
          cargo doc --workspace --no-deps --locked
          --exclude dexos-ui --exclude dexos-web
          --exclude dexos-desktop --exclude dexos-mobile

  # Dedicated gate for the Dioxus `ui/*` frontends, kept out of the engine
  # `--workspace` jobs above: the web app is a wasm32 target and the native
  # desktop/mobile apps need the wry/webkit system libraries. The renderer-
  # agnostic `dexos-ui` shared crate is linted and tested like an engine crate;
  # the app crates are compiled for their real targets.
  apps:
    name: dioxus frontends
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          components: clippy
          target: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: shared crate (clippy + test)
        run: |
          cargo clippy -p dexos-ui --all-targets --locked -- -D warnings
          cargo test -p dexos-ui --locked
      - name: web app (wasm build)
        env:
          # The workflow-level `RUSTFLAGS: -D warnings` REPLACES the target
          # rustflags in `.cargo/config.toml` (Cargo does not merge the two), so
          # the getrandom wasm backend cfg must be repeated here — without it the
          # crypto tree (getrandom 0.3+/0.4, reached via ed25519/k256 through
          # `proto`) fails to compile for wasm.
          RUSTFLAGS: '-D warnings --cfg getrandom_backend="wasm_js"'
        run: cargo build -p dexos-web --target wasm32-unknown-unknown --locked
      - name: native app system libraries (wry / webkit2gtk)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev \
            libgtk-3-dev libsoup-3.0-dev libxdo-dev
      - name: desktop + mobile apps (check)
        run: |
          cargo check -p dexos-desktop --locked
          cargo check -p dexos-mobile --locked

  state-roots:
    name: state-root agreement
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: verify-state-roots.sh
        run: ./scripts/verify-state-roots.sh

  coverage:
    name: coverage (llvm-cov lcov artifact)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: install cargo-llvm-cov
        uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2
        with:
          tool: cargo-llvm-cov
      - name: workspace coverage (lcov)
        run: |
          # ui/* frontends are gated by the `apps` job; the coverage floors
          # below only concern the deterministic engine crates.
          cargo llvm-cov --workspace --locked --lcov --output-path lcov.info \
            --ignore-filename-regex '(tests?/|target/)' \
            --exclude dexos-ui --exclude dexos-web \
            --exclude dexos-desktop --exclude dexos-mobile
          test -s lcov.info
          # Floor: report must mention real crates (not empty).
          grep -q 'SF:.*crates/' lcov.info
      - name: per-crate coverage floors (core crates)
        run: |
          # Ratchet against coverage decay: parse the lcov report generated by
          # the single workspace llvm-cov run above (no second instrumented
          # build) and enforce a per-crate line-rate floor for each
          # deterministic-core crate. A single aggregate threshold (e.g.
          # --fail-under-lines across multiple --package flags) would let one
          # crate's coverage collapse while the others mask it, so each crate
          # is checked on its own.
          #
          # Floors are deliberately CONSERVATIVE — a uniform 60% for every core
          # crate. These crates are heavily tested and sit well above 60% today
          # (a local cargo llvm-cov run put them all in the 90-98% range), so
          # 60% cannot fail on an honest tree, yet it still trips on a major
          # regression such as "half the tests were deleted" or a new
          # wire-facing rewrite landing untested. The coverage job here is the
          # source of truth for the numbers; local measurements can differ
          # slightly from CI's Linux build, so we err low. Ratchet these floors
          # UP over time as coverage grows; do not lower them without written
          # justification.
          #
          # A crate that vanishes from the report entirely (LF sum == 0) also
          # fails: absence of data is treated as zero coverage, not success.
          awk '
            BEGIN {
              n = split("types execution orderbook risk state-tree", order, " ")
              floor["types"] = 60
              floor["execution"] = 60
              floor["orderbook"] = 60
              floor["risk"] = 60
              floor["state-tree"] = 60
            }
            /^SF:/ {
              cur = ""
              for (i = 1; i <= n; i++) {
                if (index($0, "crates/" order[i] "/") > 0) { cur = order[i]; break }
              }
            }
            cur != "" && /^LH:/ { hit[cur] += substr($0, 4) }
            cur != "" && /^LF:/ { found[cur] += substr($0, 4) }
            END {
              status = 0
              for (i = 1; i <= n; i++) {
                c = order[i]
                if (found[c] == 0) {
                  printf "FAIL %-11s no lines in lcov report (crate missing from coverage; floor %d%%)\n", c, floor[c]
                  status = 1
                  continue
                }
                rate = 100 * hit[c] / found[c]
                if (rate < floor[c]) {
                  printf "FAIL %-11s line coverage %.2f%% is below floor %d%%\n", c, rate, floor[c]
                  status = 1
                } else {
                  printf "ok   %-11s line coverage %.2f%% (floor %d%%)\n", c, rate, floor[c]
                }
              }
              exit status
            }
          ' lcov.info
      - name: upload lcov artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-lcov
          path: lcov.info
          if-no-files-found: error

  determinism:
    name: determinism (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          # GitHub-hosted ARM64 Linux runners (public repos).
          - os: ubuntu-24.04-arm
            arch: aarch64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: determinism suite
        run: ./scripts/check-determinism.sh
      - name: publish digest
        run: cat determinism-digest.txt
      - name: upload per-arch digest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: determinism-${{ matrix.arch }}
          path: |
            determinism-digest.txt
          if-no-files-found: error

  # Fails closed if x86_64 and aarch64 disagree on any protocol-stable digest
  # key: `execution_replay_root` (the execution engine's state root over the
  # pinned golden replay script — recomputed by each arch's build, so a real
  # matching/risk/funding/liquidation divergence is caught here) plus the
  # storage keys `snapshot_sha256` / `state_root` / `wire_corpus_sha256`.
  determinism-compare:
    name: multi-arch digest gate
    needs: determinism
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: fetch x86_64 digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: determinism-x86_64
          path: digests/x86_64
      - name: fetch aarch64 digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: determinism-aarch64
          path: digests/aarch64
      - name: fail on protocol-stable key divergence
        run: |
          ./scripts/compare-determinism-digests.sh \
            digests/x86_64/determinism-digest.txt \
            digests/aarch64/determinism-digest.txt

  cross-arch-snapshot:
    name: cross-arch snapshot transfer
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: export snapshot on x86_64
        run: |
          mkdir -p transfer
          export CROSS_ARCH_SNAPSHOT_OUT="$PWD/transfer/state.snap"
          cargo test -p storage --test cross_arch_snapshot --locked \
            cross_arch_snapshot_round_trip -- --nocapture
          test -s transfer/state.snap
      - name: upload snapshot
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cross-arch-snapshot
          path: transfer/
          if-no-files-found: error

  cross-arch-snapshot-import:
    name: cross-arch snapshot import (aarch64)
    needs: cross-arch-snapshot
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: download x86_64 snapshot
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: cross-arch-snapshot
          path: transfer
      - name: import + verify on aarch64
        run: |
          test -s transfer/state.snap
          export CROSS_ARCH_SNAPSHOT_IN="$PWD/transfer/state.snap"
          cargo test -p storage --test cross_arch_snapshot --locked \
            cross_arch_snapshot_round_trip -- --nocapture

  fuzz-stub:
    name: fuzz stub (time-boxed)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: time-boxed property/fuzz stub
        env:
          FUZZ_BUDGET_SECS: "180"
        run: ./scripts/fuzz-stub.sh

  release-artifacts:
    name: release artifact scaffolding
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: build signed-ready artifacts (checksum + SBOM + rollback)
        run: ./scripts/build-release-artifacts.sh
      - name: smoke-test artifact
        run: |
          # Same default the build script uses when TARGET is unset.
          TARGET="$(rustc -vV | awk '/^host:/{print $2}')"
          BIN=$(ls dist/marketd-* | head -1)
          "${BIN}" --help
          # Unwired ops must fail closed (nonzero) without --experimental.
          if "${BIN}" replay --snapshot s --log l; then
            echo "replay stub must exit nonzero" >&2
            exit 1
          fi
          # Checksums verify (artifact names are target-suffixed).
          (cd dist && shasum -a 256 -c "SHA256SUMS-${TARGET}")
          test -f "dist/sbom-${TARGET}.cdx.json"
          test -f "dist/build-metadata-${TARGET}.json"
          test -f "dist/ROLLBACK-${TARGET}.md"
          python3 -c "import json; json.load(open('dist/sbom-${TARGET}.cdx.json'))"
          python3 -c "import json; m=json.load(open('dist/build-metadata-${TARGET}.json')); assert m['panic_strategy']=='abort'"

  build-release:
    name: build (release)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: production marketd (minimal features)
        run: cargo build --release --locked --bin marketd --no-default-features
      - name: development marketd
        run: cargo build --release --locked --bin marketd --all-features
      - name: workspace
        # ui/* frontends are built by the `apps` job (see the lint job's clippy
        # step); the engine's release gate stays free of the Dioxus tree.
        run: >-
          cargo build --release --workspace --locked
          --exclude dexos-ui --exclude dexos-web
          --exclude dexos-desktop --exclude dexos-mobile
      - name: release profile is panic=abort
        run: |
          grep -q 'panic = "abort"' Cargo.toml

  gates:
    name: safety gates
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: immutable actions and least privilege
        run: ./scripts/check-workflows.sh
      - name: no floating point in deterministic core
        run: ./scripts/check-no-float.sh
      - name: deterministic-core dependency direction
        run: ./scripts/check-core-deps.sh
      - name: no unannotated unsafe in core
        run: ./scripts/check-unsafe.sh

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          command: check advisories bans licenses sources

  # Optional portability job: affinity / urandom / filesystem differences.
  # Runs on workflow_dispatch and the weekly schedule only (not every PR).
  portability-macos:
    name: portability (macos)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: test (locked)
        # ui/* frontends are gated by the `apps` job (see the lint job).
        run: >-
          cargo test --workspace --locked
          --exclude dexos-ui --exclude dexos-web
          --exclude dexos-desktop --exclude dexos-mobile
      - name: safety gates
        run: |
          ./scripts/check-no-float.sh
          ./scripts/check-core-deps.sh
          ./scripts/check-unsafe.sh
      - name: determinism on macOS host
        run: ./scripts/check-determinism.sh
