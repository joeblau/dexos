name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly portability / cold-cache sanity (Monday 06:00 UTC).
    - cron: "0 6 * * 1"

# Fork pull requests receive a read-only token. Jobs repeat this declaration so
# future edits cannot accidentally inherit broader repository defaults.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: test
        run: cargo test --workspace --locked

  docs:
    name: cargo doc
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: docs (fail on warnings)
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --no-deps --locked

  state-roots:
    name: state-root agreement
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: verify-state-roots.sh
        run: ./scripts/verify-state-roots.sh

  determinism:
    name: scalar≡vectorized + endian notes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: determinism suite
        run: ./scripts/check-determinism.sh
      - name: publish digest
        run: cat determinism-digest.txt

  fuzz-stub:
    name: fuzz stub (time-boxed)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: time-boxed property/fuzz stub
        env:
          FUZZ_BUDGET_SECS: "180"
        run: ./scripts/fuzz-stub.sh

  release-artifacts:
    name: release artifact scaffolding
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: build signed-ready artifacts (checksum + SBOM + rollback)
        run: ./scripts/build-release-artifacts.sh
      - name: smoke-test artifact
        run: |
          BIN=$(ls dist/marketd-* | head -1)
          "${BIN}" --help
          # Unwired ops must fail closed (nonzero) without --experimental.
          if "${BIN}" replay --snapshot s --log l; then
            echo "replay stub must exit nonzero" >&2
            exit 1
          fi
          # Checksums verify.
          (cd dist && shasum -a 256 -c SHA256SUMS)
          test -f dist/sbom.cdx.json
          test -f dist/build-metadata.json
          test -f dist/ROLLBACK.md
          python3 -c "import json; json.load(open('dist/sbom.cdx.json'))"
          python3 -c "import json; m=json.load(open('dist/build-metadata.json')); assert m['panic_strategy']=='abort'"

  build-release:
    name: build (release)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: production marketd (minimal features)
        run: cargo build --release --locked --bin marketd --no-default-features
      - name: development marketd
        run: cargo build --release --locked --bin marketd --all-features
      - name: workspace
        run: cargo build --release --workspace --locked
      - name: release profile is panic=abort
        run: |
          grep -q 'panic = "abort"' Cargo.toml

  gates:
    name: safety gates
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: immutable actions and least privilege
        run: ./scripts/check-workflows.sh
      - name: no floating point in deterministic core
        run: ./scripts/check-no-float.sh
      - name: deterministic-core dependency direction
        run: ./scripts/check-core-deps.sh
      - name: no unannotated unsafe in core
        run: ./scripts/check-unsafe.sh

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          command: check advisories bans licenses sources

  # Optional portability job: affinity / urandom / filesystem differences.
  # Runs on workflow_dispatch and the weekly schedule only (not every PR).
  portability-macos:
    name: portability (macos)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: test (locked)
        run: cargo test --workspace --locked
      - name: safety gates
        run: |
          ./scripts/check-no-float.sh
          ./scripts/check-core-deps.sh
          ./scripts/check-unsafe.sh
      - name: determinism on macOS host
        run: ./scripts/check-determinism.sh
