[package]
name = "marketd"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
publish.workspace = true

[[bin]]
name = "marketd"
path = "src/main.rs"

[lints]
workspace = true

[features]
default = []
# Operator-only diagnostics. Never enable this feature in production artifacts.
dev-tools = ["dep:benchmarks", "node/dev-tools"]
mock-chains = ["node/mock-chains"]
metrics-http = []
simd = []

[dependencies]
node = { path = "../../crates/node" }
benchmarks = { path = "../../crates/benchmarks", optional = true }
crypto = { path = "../../crates/crypto" }
storage = { path = "../../crates/storage" }
clap.workspace = true
anyhow.workspace = true
getrandom.workspace = true
